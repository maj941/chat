<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Captain Capy — Chat</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --panel-2: #1b1f26;
    --border: #262b34;
    --text: #e6e7ea;
    --muted: #8b93a1;
    --accent: #7c5cff;
    --accent-2: #5b8def;
    --user: #2a3a5c;
    --assistant: #1e2229;
    --ok: #4ade80;
    --warn: #facc15;
    --danger: #f87171;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14.5px; }
  body { display: flex; flex-direction: column; height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, rgba(124,92,255,0.08), transparent); flex: 0 0 auto; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: 0.2px; }
  .logo { width: 28px; height: 28px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: grid; place-items: center; font-weight: 700; color: white; font-size: 14px; }
  .meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; align-items: center; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border); font-size: 11.5px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.live { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .dot.typing { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  main { flex: 1 1 auto; overflow-y: auto; padding: 22px 18px 8px; display: flex; flex-direction: column; gap: 12px; }
  main::-webkit-scrollbar { width: 8px; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .row { display: flex; width: 100%; }
  .row.user { justify-content: flex-end; }
  .row.assistant { justify-content: flex-start; }
  .bubble { max-width: min(72%, 720px); padding: 10px 14px; border-radius: 14px; line-height: 1.45; word-wrap: break-word; white-space: pre-wrap; border: 1px solid var(--border); position: relative; }
  .row.user .bubble { background: var(--user); border-color: #34507a; border-bottom-right-radius: 4px; }
  .row.assistant .bubble { background: var(--assistant); border-bottom-left-radius: 4px; }
  .bubble .who { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }
  .bubble .ts { font-size: 10.5px; color: var(--muted); margin-top: 6px; opacity: 0.7; }
  .files { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .file-card { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); font-size: 12.5px; color: var(--text); text-decoration: none; }
  .file-card:hover { background: rgba(255,255,255,0.08); }
  .file-card .icon { opacity: 0.8; }
  .img-prev { display: block; max-width: 320px; max-height: 320px; border-radius: 10px; border: 1px solid var(--border); margin-top: 8px; }
  .typing { display: none; align-items: center; gap: 6px; padding: 8px 14px; color: var(--muted); font-size: 12.5px; }
  .typing.on { display: inline-flex; }
  .typing .blob { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blob 1.2s infinite; }
  .typing .blob:nth-child(2) { animation-delay: 0.15s; }
  .typing .blob:nth-child(3) { animation-delay: 0.3s; }
  @keyframes blob { 0%,60%,100% { transform: translateY(0); opacity: 0.5;} 30% { transform: translateY(-4px); opacity: 1;} }
  footer { flex: 0 0 auto; border-top: 1px solid var(--border); padding: 10px 14px 14px; background: var(--panel); }
  .composer { display: flex; align-items: flex-end; gap: 8px; }
  .attach { width: 38px; height: 38px; border-radius: 10px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); display: grid; place-items: center; cursor: pointer; font-size: 17px; user-select: none; }
  .attach:hover { color: var(--text); border-color: var(--accent); }
  textarea { flex: 1 1 auto; min-height: 42px; max-height: 200px; resize: none; padding: 11px 12px; border-radius: 10px; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); font: inherit; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--accent); }
  .send { padding: 0 16px; height: 42px; border-radius: 10px; border: 0; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 600; cursor: pointer; font-size: 14px; }
  .send:disabled { opacity: 0.45; cursor: not-allowed; }
  .pending { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 8px; }
  .pending .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px; border-radius: 8px; background: var(--panel-2); border: 1px solid var(--border); font-size: 12px; }
  .pending .chip .x { cursor: pointer; color: var(--danger); font-weight: 600; }
  .drop-overlay { position: fixed; inset: 0; background: rgba(124,92,255,0.18); border: 3px dashed var(--accent); display: none; align-items: center; justify-content: center; color: var(--text); font-size: 18px; font-weight: 600; pointer-events: none; z-index: 1000; }
  .drop-overlay.on { display: flex; }
  .empty { color: var(--muted); text-align: center; padding: 40px 12px; font-size: 13px; }
  code, pre { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; }
  /* Gate overlay */
  .gate { position: fixed; inset: 0; background: var(--bg); display: grid; place-items: center; z-index: 2000; }
  .gate .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 22px 26px; width: min(420px, 92%); }
  .gate h1 { font-size: 16px; margin: 0 0 8px; letter-spacing: 0.3px; }
  .gate p { color: var(--muted); margin: 0 0 14px; font-size: 13px; }
  .gate label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
  .gate input { width: 100%; padding: 10px; border-radius: 8px; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); font: inherit; outline: none; }
  .gate input:focus { border-color: var(--accent); }
  .gate button { margin-top: 14px; padding: 10px 14px; border: 0; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 600; cursor: pointer; width: 100%; font-size: 14px; }
  .gate .err { color: var(--danger); margin-top: 8px; font-size: 12.5px; min-height: 16px; }
  .reset { color: var(--muted); font-size: 11.5px; text-decoration: none; padding: 4px 8px; border-radius: 6px; }
  .reset:hover { color: var(--text); background: var(--panel-2); }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">C</div>
      <div>Captain Capy</div>
      <span class="pill"><span class="dot live" id="live-dot"></span><span id="live-text">live</span></span>
    </div>
    <div class="meta">
      <span class="pill" id="msg-count">0 messages</span>
      <span class="pill" id="latency">—</span>
      <a class="reset" href="#" id="reset-link" title="Forget stored backend / token">⎋ reset</a>
    </div>
  </header>

  <main id="log">
    <div class="empty" id="empty-state">No messages yet. Type below or drag a file in.</div>
  </main>

  <div class="typing" id="typing-ind">
    <span class="blob"></span><span class="blob"></span><span class="blob"></span>
    <span>Captain typing…</span>
  </div>

  <footer>
    <div class="pending" id="pending"></div>
    <div class="composer">
      <label class="attach" title="Attach (or paste / drag-drop)" for="file-input">📎</label>
      <input type="file" id="file-input" multiple style="display:none">
      <textarea id="input" placeholder="Message Captain… (Enter to send, Shift+Enter newline)"></textarea>
      <button class="send" id="send-btn">Send</button>
    </div>
  </footer>

  <div class="drop-overlay" id="drop-overlay">Drop files to attach</div>

  <!-- Gate overlay (shown if api+token are missing or invalid) -->
  <div class="gate" id="gate" style="display:none">
    <div class="panel">
      <h1>Connect to backend</h1>
      <p>Enter the backend URL (e.g. <code>https://something.trycloudflare.com</code>) and the access token. They are stored locally on this device.</p>
      <label for="g-api">Backend URL</label>
      <input id="g-api" autocomplete="off" spellcheck="false" placeholder="https://...trycloudflare.com">
      <label for="g-tok">Token</label>
      <input id="g-tok" autocomplete="off" type="password" placeholder="bearer token">
      <button id="g-go">Connect</button>
      <div class="err" id="g-err"></div>
    </div>
  </div>

<script>
// ─── config ─────────────────────────────────────────────────────────────────
const LS_API = "captain_api";
const LS_TOK = "captain_token";

function readQuery(){
  const u = new URL(location.href);
  return { api: u.searchParams.get('api'), t: u.searchParams.get('t') };
}
function cleanQuery(){
  const u = new URL(location.href);
  if (u.searchParams.has('api') || u.searchParams.has('t')) {
    u.searchParams.delete('api'); u.searchParams.delete('t');
    history.replaceState({}, '', u.toString());
  }
}
function getApi(){ return localStorage.getItem(LS_API) || ''; }
function getTok(){ return localStorage.getItem(LS_TOK) || ''; }
function setApi(v){ localStorage.setItem(LS_API, v.replace(/\/+$/,'')); }
function setTok(v){ localStorage.setItem(LS_TOK, v); }
function clearConfig(){ localStorage.removeItem(LS_API); localStorage.removeItem(LS_TOK); }

// One-shot: if URL has ?api= or ?t=, store and strip
{
  const q = readQuery();
  if (q.api) setApi(q.api);
  if (q.t) setTok(q.t);
  if (q.api || q.t) cleanQuery();
}

const log = document.getElementById('log');
const typingInd = document.getElementById('typing-ind');
const sendBtn = document.getElementById('send-btn');
const inputEl = document.getElementById('input');
const pendingBox = document.getElementById('pending');
const fileInput = document.getElementById('file-input');
const dropOverlay = document.getElementById('drop-overlay');
const liveDot = document.getElementById('live-dot');
const liveText = document.getElementById('live-text');
const msgCountEl = document.getElementById('msg-count');
const latencyEl = document.getElementById('latency');
const emptyState = document.getElementById('empty-state');
const gate = document.getElementById('gate');
const gApi = document.getElementById('g-api');
const gTok = document.getElementById('g-tok');
const gGo = document.getElementById('g-go');
const gErr = document.getElementById('g-err');
const resetLink = document.getElementById('reset-link');

let lastTs = 0;
let pendingFiles = [];
let totalMsgs = 0;
let pollTimer = null;

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function absUrl(rel){
  const api = getApi();
  if (!api) return rel;
  if (rel.startsWith('http')) return rel;
  const sep = rel.includes('?') ? '&' : '?';
  return api + rel + sep + 't=' + encodeURIComponent(getTok());
}

async function api(path, opts){
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['X-Auth-Token'] = getTok();
  const r = await fetch(getApi() + path, opts);
  if (r.status === 401) {
    showGate('Invalid token.');
    throw new Error('401');
  }
  return r;
}

function showGate(err){
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  gApi.value = getApi();
  gTok.value = getTok();
  gErr.textContent = err || '';
  gate.style.display = 'grid';
  gApi.focus();
}
function hideGate(){ gate.style.display = 'none'; }

gGo.addEventListener('click', async () => {
  const a = gApi.value.trim();
  const t = gTok.value.trim();
  if (!a || !t) { gErr.textContent = 'Both URL and token required.'; return; }
  // Test the combo
  try {
    const r = await fetch(a.replace(/\/+$/,'') + '/api/messages?since=9999999999', { headers: { 'X-Auth-Token': t } });
    if (r.status !== 200) { gErr.textContent = 'Backend rejected ('+r.status+').'; return; }
    setApi(a); setTok(t);
    hideGate();
    lastTs = 0; totalMsgs = 0; log.innerHTML = '<div class="empty">No messages yet. Type below or drag a file in.</div>';
    poll();
  } catch (e) {
    gErr.textContent = 'Cannot reach backend: ' + e.message;
  }
});
gApi.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); gTok.focus(); } });
gTok.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); gGo.click(); } });

resetLink.addEventListener('click', e => { e.preventDefault(); clearConfig(); location.reload(); });

function renderMessage(m){
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  const row = document.createElement('div');
  row.className = 'row ' + (m.role === 'user' ? 'user' : 'assistant');
  const bub = document.createElement('div');
  bub.className = 'bubble';
  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = m.role === 'user' ? 'You' : 'Captain';
  bub.appendChild(who);
  if (m.text) {
    const txt = document.createElement('div');
    txt.innerHTML = escapeHTML(m.text);
    bub.appendChild(txt);
  }
  if (m.files && m.files.length) {
    const fbox = document.createElement('div');
    fbox.className = 'files';
    m.files.forEach(f => {
      if (f.type && f.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.className = 'img-prev';
        img.src = absUrl(f.url);
        img.alt = f.name;
        bub.appendChild(img);
      } else {
        const a = document.createElement('a');
        a.className = 'file-card';
        a.href = absUrl(f.url);
        a.target = '_blank';
        a.innerHTML = '<span class="icon">📄</span><span>'+escapeHTML(f.name)+'</span><span style="opacity:.6;font-size:11px">'+formatSize(f.size)+'</span>';
        fbox.appendChild(a);
      }
    });
    if (fbox.children.length) bub.appendChild(fbox);
  }
  const ts = document.createElement('div');
  ts.className = 'ts';
  const d = new Date(m.ts * 1000);
  ts.textContent = d.toLocaleTimeString();
  bub.appendChild(ts);
  row.appendChild(bub);
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  totalMsgs += 1;
  msgCountEl.textContent = totalMsgs + ' messages';
}

function formatSize(n){
  if (!n) return '';
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(2) + ' MB';
}

async function poll(){
  if (!getApi() || !getTok()) { showGate(); return; }
  const t0 = performance.now();
  try {
    const r = await api('/api/messages?since=' + lastTs);
    const data = await r.json();
    const dt = Math.round(performance.now() - t0);
    latencyEl.textContent = dt + 'ms';
    liveDot.classList.add('live'); liveDot.classList.remove('typing');
    liveText.textContent = 'live';
    if (data.messages && data.messages.length){
      data.messages.forEach(m => { renderMessage(m); if (m.ts > lastTs) lastTs = m.ts; });
    }
    if (data.agent_typing) {
      typingInd.classList.add('on');
      liveDot.classList.remove('live'); liveDot.classList.add('typing');
      liveText.textContent = 'typing';
    } else {
      typingInd.classList.remove('on');
    }
  } catch (e) {
    if (String(e.message) !== '401') {
      liveDot.classList.remove('live'); liveDot.classList.remove('typing');
      liveText.textContent = 'reconnecting…';
    }
  } finally {
    pollTimer = setTimeout(poll, 1500);
  }
}

function renderPending(){
  pendingBox.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = '<span>'+escapeHTML(f.name)+'</span><span style="opacity:.6;font-size:11px">'+formatSize(f.size)+'</span><span class="x" data-i="'+i+'">×</span>';
    pendingBox.appendChild(chip);
  });
  pendingBox.querySelectorAll('.x').forEach(x => x.addEventListener('click', () => {
    pendingFiles.splice(+x.dataset.i, 1); renderPending();
  }));
}

async function uploadFile(file){
  const fd = new FormData();
  fd.append('file', file);
  const r = await api('/api/upload', { method:'POST', body: fd });
  const j = await r.json();
  if (j && j.url) {
    pendingFiles.push(j);
    renderPending();
  }
}

async function send(){
  const text = inputEl.value.trim();
  if (!text && !pendingFiles.length) return;
  sendBtn.disabled = true;
  try {
    await api('/api/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text, files: pendingFiles, role: 'user' })
    });
    inputEl.value = '';
    pendingFiles = [];
    renderPending();
  } catch (e) {}
  sendBtn.disabled = false;
  inputEl.focus();
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
fileInput.addEventListener('change', async e => {
  for (const f of e.target.files) await uploadFile(f);
  fileInput.value = '';
});
window.addEventListener('paste', async e => {
  if (!e.clipboardData) return;
  for (const item of e.clipboardData.items) {
    if (item.kind === 'file') {
      const f = item.getAsFile();
      if (f) await uploadFile(f);
    }
  }
});
let dragCount = 0;
window.addEventListener('dragenter', e => { e.preventDefault(); dragCount++; dropOverlay.classList.add('on'); });
window.addEventListener('dragleave', e => { e.preventDefault(); dragCount--; if (dragCount<=0) { dragCount=0; dropOverlay.classList.remove('on'); } });
window.addEventListener('dragover', e => { e.preventDefault(); });
window.addEventListener('drop', async e => {
  e.preventDefault(); dragCount = 0; dropOverlay.classList.remove('on');
  if (e.dataTransfer && e.dataTransfer.files) {
    for (const f of e.dataTransfer.files) await uploadFile(f);
  }
});

// Start
if (!getApi() || !getTok()) showGate(); else poll();
inputEl.focus();
</script>
</body>
</html>
